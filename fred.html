<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Gallery</title>
    <style>

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #ff00b3, #15ee32); 
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .btn-group {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-group button {
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            border-radius: 20px;
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-group button:hover {
            background-color: white;
            color: #b922df;
        }
      .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1100px;
            margin: 20px auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(5px); 
        }

        .gallery-item {
            overflow: hidden;
            border-radius: 15px;
            border: 4px solid white;
            height: 200px;
            background-color: #eee;
        }

        .gallery img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
            display: block;
        }

        .gallery img:hover {
            transform: scale(1.1);
        }

        /* Pagination */
        .pagination {
            margin-top: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .pagination button {
            padding: 12px 25px;
            border: none;
            background-color: rgb(0, 0, 0);
            color: #1be958;
            cursor: pointer;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .pagination button:disabled {
            background-color: #666;
            color: #999;
            cursor: not-allowed;
        }

        h1.title {
            font-size: clamp(30px, 5vw, 50px);
            color: white;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="btn-group">
        <button onclick="filterGallery('cat')">Cat</button>
        <button onclick="filterGallery('me')">Me</button>
        <button onclick="filterGallery('movie')">Fav movie</button>
    </div>

    <h1 class="title">Hello Everyone!</h1>

    <div class="gallery" id="gallery">
        </div>

    <div class="pagination">
        <button id="prevBtn" onclick="changePage(-1)"> Previous</button>
        <span id="pageNumber" style="color: white; font-weight: bold; font-size: 1.2rem;">Page 1</span>
        <button id="nextBtn" onclick="changePage(1)">Next </button>
    </div>

    <script>
        
        const myImages = [
            { src: "c:\Users\USer\Desktop\MEL MEL\cutee.jpg", alt: "cat" },
            { src:  "with my fav princess.jpg", alt: "Sample Car" }, 
            { src: "", alt: "Flower" },
            { src: "c:\Users\USer\Desktop\MEL MEL\cutiee.jpg", alt: "Sample Cat" }, 
            { src: "c:\Users\USer\Desktop\MEL MEL\cutee.jpg", alt: "Rose" },
            { src: "carnation.jpg", alt: "Flower" },
            { src: "freesia.webp", alt: "Flower" },
            { src: "poppy.jpg", alt: "Flower" },
            { src: "https://via.placeholder.com/400x400.png?text=Add+Photo+Here", alt: "Placeholder" }
           
        ];

        const itemsPerPage = 6; 
        let currentPage = 1;
        
        function displayImages() {
            const gallery = document.getElementById("gallery");
            const prevBtn = document.getElementById("prevBtn");
            const nextBtn = document.getElementById("nextBtn");
            const pageText = document.getElementById("pageNumber");

            gallery.innerHTML = "";
            
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const paginatedImages = myImages.slice(start, end);
            
            paginatedImages.forEach(imgData => {
                const div = document.createElement("div");
                div.className = "gallery-item";

                const imgTag = document.createElement("img");
                imgTag.src = imgData.src;
                imgTag.alt = imgData.alt;

                imgTag.onerror = function() { 
                    this.src = 'https://via.placeholder.com/300x300?text=Check+File+Path'; 
                };

                div.appendChild(imgTag);
                gallery.appendChild(div);
            });
            
            pageText.innerText = `Page ${currentPage}`;
            prevBtn.disabled = (currentPage === 1);
            nextBtn.disabled = (end >= myImages.length);
        }
        
        function changePage(step) {
            currentPage += step;
            displayImages();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function filterGallery(type) {
            alert("Filtering for: " + type + "\n(Tip: Pwede nating lagyan ng tags ang images mo para gumana ito!)");
        }
        
        displayImages();
    </script>
</body>
</html>
